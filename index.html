<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex nofollow">

  <title>Veoリンク集</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.6;
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
      background: #f7f7f7;
      color: #222;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .note {
      margin-bottom: 20px;
      color: #555;
    }
    .group {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }
    .group h2 {
      font-size: 20px;
      margin: 0 0 10px;
    }
    ul {
      padding-left: 20px;
      margin: 0;
    }
    li {
      margin: 10px 0;
      word-break: break-all;
    }
    a {
      color: #0056cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .small {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>Veoリンク集</h1>
