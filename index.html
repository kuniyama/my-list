<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>動画リンク集</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
      --accent: #2563eb;
      --accent2: #eff6ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .group {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .group h2 {
      font-size: 20px;
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    li {
      margin: 0;
    }

    a.link {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    a.link:hover,
    a.link:focus {
      background: var(--accent2);
      border-color: #bfdbfe;
      outline: none;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e5eefc;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>動画リンク集</h1>
    <p class="note">BJ50期の動画共有リンク一覧です。</p>

    <div class="group">
      <h2>20260517 ミームTRM</h2>
      <ul>
        <li><a class="link" href="https://app.veo.co/matches/20260517-1u11-v40e43ae/" target="_blank" rel="noopener noreferrer">ミーム①</a></li>
        <li><a class="link" href="https://app.veo.co/matches/20260517-3u9-v9220667/" target="_blank" rel="noopener noreferrer">ミーム②</a></li>
        <li><a class="link" href="https://app.veo.co/matches/20260517-3u11-v62638bc/" target="_blank" rel="noopener noreferrer">ミーム③</a></li>
        <li><a class="link" href="https://app.veo.co/matches/20260517-u114-v297eddf/" target="_blank" rel="noopener noreferrer">ミーム④</a></li>
        <li><a class="link" href="https://app.veo.co/matches/20260517-5u11-vc1cf240/" target="_blank" rel="noopener noreferrer">ミーム⑤</a></li>
        <li><a class="link" href="https://app.veo.co/matches/20260517-6u11-v213286d/" target="_blank" rel="noopener noreferrer">ミーム⑥</a></li>
      </ul>
    </div>

    <div class="group">
      <h2>20260412 清新カップ</h2>
      <ul>
        <li><a class="link" href="https://youtube.com/playlist?list=PLFzspPm7hQvXGd1MptGSZpzt3nXMu9QR6&si=AR7hKT8GCvVkwK6h" target="_blank" rel="noopener noreferrer">YouTube再生リスト</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
